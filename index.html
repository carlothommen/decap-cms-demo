<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <title>Bücher Liebe</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body class="bg-stone-50 text-stone-900">

    <div x-data="{ titel: '', untertitel: '', heroBild: '', buecher: [] }"
         x-init="
            fetch('/content/home.json')
                .then(r => r.json())
                .then(d => {
                    titel = d.titel
                    untertitel = d.untertitel
                    heroBild = d.hero_bild
                    buecher = d.buecher || []
                })
         ">

        <!-- Hero -->
        <header class="relative flex items-center justify-center h-screen overflow-hidden bg-stone-100">
            <img :src="heroBild" class="absolute inset-0 object-cover w-full h-full opacity-40" />
            <div class="relative z-10 px-8 text-center">
                <h1 class="text-6xl font-bold text-white md:text-8xl" x-text="titel"></h1>
                <p class="mt-4 text-xl text-stone-300 md:text-2xl" x-text="untertitel"></p>
            </div>
        </header>

        <!-- Bücher Galerie -->
        <section class="max-w-6xl px-8 py-20 mx-auto">
            <h2 class="mb-12 text-3xl font-bold text-center">Meine Empfehlungen</h2>
            <div class="grid gap-8 md:grid-cols-3">
                <template x-for="buch in buecher" :key="buch.buchtitel">
                    <div class="overflow-hidden transition-transform bg-white shadow-md rounded-xl hover:scale-105">
                        <img :src="buch.cover" class="object-cover w-full h-64" />
                        <div class="p-6">
                            <h3 class="text-xl font-bold" x-text="buch.buchtitel"></h3>
                            <p class="mt-1 text-sm text-stone-500" x-text="buch.autor"></p>
                            <p class="mt-3 text-stone-600" x-text="buch.beschreibung"></p>
                        </div>
                    </div>
                </template>
            </div>
        </section>

        <!-- Footer -->
        <footer class="py-8 text-center border-t text-stone-400 border-stone-200">
            <p>Made with Bücher Liebe</p>
        </footer>

    </div>

<script>
    if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
            if (!user) {
                window.netlifyIdentity.on("login", () => {
                    document.location.href = "/admin/";
                });
            }
        });
    }
</script>
</body>
</html>
