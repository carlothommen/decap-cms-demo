<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <title>Bücher Liebe</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
</head>
<body class="bg-stone-50 text-stone-900 font-['Lexend']">

    <div x-data="{ titel: '', untertitel: '', buecher: [] }"
         x-init="
            fetch('/content/home.json')
                .then(r => r.json())
                .then(d => {

                    titel = d.titel
                    untertitel = d.untertitel
                    buecher = d.buecher || []

                })
         ">

        <!-- Hero -->
        <header class="relative flex items-center justify-center h-screen overflow-hidden bg-[#6E4CEB]">
            <!-- Parallax Ebenen -->
            <img src="/images/Gruppe.svg" class="parallax-layer absolute bottom-0 left-0 w-[35%] max-w-md" data-speed="1.5" />
            <img src="/images/Gruppe2.svg" class="parallax-layer absolute bottom-0 left-[10%] w-[40%] max-w-lg" data-speed="0.8" />
            <img src="/images/Gruppe3.svg" class="parallax-layer absolute bottom-0 right-[10%] w-[40%] max-w-lg" data-speed="0.8" />
            <img src="/images/Gruppe.svg" class="parallax-layer absolute bottom-0 right-0 w-[35%] max-w-md" data-speed="1.5" />

            <div class="relative z-10 px-8 text-center parallax-layer" data-speed="1.0">
                <h1 class="text-6xl font-bold text-white md:text-8xl" x-text="titel"></h1>
                <p class="mt-4 text-xl text-white md:text-2xl" x-text="untertitel"></p>
            </div>
        </header>

        <!-- Bücher Galerie -->
        <section class="max-w-6xl px-8 py-20 mx-auto">
            <h2 class="mb-12 text-3xl font-bold text-center">Meine Empfehlungen</h2>
            <div class="grid gap-8 md:grid-cols-3">
                <template x-for="buch in buecher" :key="buch.buchtitel">
                    <div class="overflow-hidden transition-transform bg-white shadow-md rounded-xl hover:scale-105">
                        <img :src="buch.cover" class="object-cover w-full h-64" />
                        <div class="p-6">
                            <h3 class="text-xl font-bold" x-text="buch.buchtitel"></h3>
                            <p class="mt-1 text-sm text-stone-500" x-text="buch.autor"></p>
                            <p class="mt-3 text-stone-600" x-text="buch.beschreibung"></p>
                        </div>
                    </div>
                </template>
            </div>
        </section>

        <!-- Footer -->
        <footer class="py-8 text-center border-t text-stone-400 border-stone-200">
            <p>Made by Carlo with Bücherliebe</p>
        </footer>

    </div>

<script>
    window.addEventListener('scroll', () => {
        const scrollY = window.scrollY;
        document.querySelectorAll('.parallax-layer').forEach(layer => {
            const speed = parseFloat(layer.dataset.speed);
            layer.style.transform = `translateY(${scrollY * speed}px)`;
        });
    });
</script>

<script>
    if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
            if (!user) {
                window.netlifyIdentity.on("login", () => {
                    document.location.href = "/admin/";
                });
            }
        });
    }
</script>
</body>
</html>
