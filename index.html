<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind CSS Framework -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Alpine.js fuer dynamische Inhalte (CMS-Daten anzeigen) -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <title>Bücher Liebe</title>

    <!-- Netlify Identity Widget fuer CMS-Login -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

    <!-- Lade-Animationen und Schrift -->
    <style>
        /* Buecher fahren von oben rein */
        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        /* Text blendet ein und schwebt hoch */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Aeussere Buecher: starten sofort */
        .anim-slide-down {
            animation: slideDown 1.2s ease-out forwards;
        }
        /* Innere Buecher: starten mit 0.3s Verzoegerung */
        .anim-slide-down-slow {
            animation: slideDown 1.5s ease-out 0.3s forwards;
            opacity: 0;
        }
        /* Titel: blendet nach 0.8s ein */
        .anim-fade-in {
            animation: fadeIn 1s ease-out 0.8s forwards;
            opacity: 0;
        }
        /* Untertitel: blendet nach 1.2s ein */
        .anim-fade-in-late {
            animation: fadeIn 1s ease-out 1.2s forwards;
            opacity: 0;
        }
        /* Google Font auf die ganze Seite anwenden */
        body {
            font-family: 'Forum', serif;
        }
        /* Font Shadow */
        .hero-text {
    text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }

    </style>

    <!-- Google Font "Forum" laden -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Forum&display=swap" rel="stylesheet">
</head>
<body class="bg-stone-50 text-stone-900 ">

    <!-- Alpine.js: CMS-Daten und Notion-Bücher laden -->
    <div x-data="{
            titel: '', untertitel: '',
            buecher: [], seite: 1, mehrVorhanden: false, ladet: false,
            sortierung: 'titel',
            ladeBuecher() {
                this.ladet = true
                fetch('https://notion-buecher.carlothommen.workers.dev?page=' + this.seite + '&sort=' + this.sortierung)
                    .then(r => r.json())
                    .then(d => {
                        const neue = d.results.map(r => {
                            const bild = r.properties.Bild?.files?.[0]
                            const bildUrl = bild?.external?.url || bild?.file?.url || r.icon?.external?.url || r.icon?.file?.url || ''
                            return {
                                titel: r.properties.Titel.title[0]?.plain_text || '',
                                autor: r.properties['Autor*in'].rich_text[0]?.plain_text || '',
                                beschreibung: r.properties.Beschreibung.rich_text[0]?.plain_text || '',
                                bild: bildUrl,
                                tags: (r.properties.Tags?.multi_select || []).map(t => t.name),
                                url: r.properties.URL?.url || ''
                            }
                        })
                        if (this.seite === 1) {
                            this.buecher = neue
                        } else {
                            this.buecher = [...this.buecher, ...neue]
                        }
                        this.mehrVorhanden = d.has_more
                        this.ladet = false
                    })
            },
            wechsleSortierung(sort) {
                this.sortierung = sort
                this.seite = 1
                this.ladeBuecher()
            }
         }"
         x-init="
            fetch('/content/home.json')
                .then(r => r.json())
                .then(d => {
                    titel = d.titel
                    untertitel = d.untertitel
                });
            ladeBuecher()
         ">

        <!-- Hero -->
        <header class="relative flex items-center justify-center h-screen overflow-hidden bg-[#6E4CEB]">
            <!-- Parallax Ebenen: 4 Buechertuerme mit unterschiedlicher Scroll-Geschwindigkeit -->
            <img src="/images/Gruppe.svg" class="parallax-layer anim-slide-down absolute bottom-0 left-0 w-[35%] max-w-md" data-speed="1.5" />
            <img src="/images/Gruppe2.svg" class="parallax-layer anim-slide-down-slow absolute bottom-0 left-[10%] w-[40%] max-w-lg" data-speed="0.8" />
            <img src="/images/Gruppe3.svg" class="parallax-layer anim-slide-down-slow absolute bottom-0 right-[10%] w-[40%] max-w-lg" data-speed="0.8" />
            <img src="/images/Gruppe.svg" class="parallax-layer anim-slide-down absolute bottom-0 right-0 w-[35%] max-w-md" data-speed="1.5" />

            <!-- Titel und Untertitel (aus CMS) -->
            <div class="relative z-10 px-8 mb-64 text-center parallax-layer" data-speed="1.0">
                <h1 class="text-6xl font-bold text-white anim-fade-in md:text-8xl hero-text" x-text="titel"></h1>
                <p class="mt-4 text-xl text-white anim-fade-in-late md:text-2xl hero-text" x-text="untertitel"></p>
            </div>
        </header>

        <!-- Bücher Galerie: Karten werden aus Notion-Datenbank geladen -->
        <section class="max-w-6xl px-8 py-20 mx-auto">
            <h2 class="mb-8 text-3xl font-bold text-center">Meine Empfehlungen</h2>

            <!-- Sortier-Buttons -->
            <div class="flex flex-wrap justify-center gap-3 mb-12">
                <button @click="wechsleSortierung('titel')"
                    class="px-4 py-2 text-sm rounded-full transition-colors"
                    :class="sortierung === 'titel' ? 'bg-[#6E4CEB] text-white' : 'bg-stone-200 text-stone-700 hover:bg-stone-300'"
                >Titel A-Z</button>
                <button @click="wechsleSortierung('autor')"
                    class="px-4 py-2 text-sm rounded-full transition-colors"
                    :class="sortierung === 'autor' ? 'bg-[#6E4CEB] text-white' : 'bg-stone-200 text-stone-700 hover:bg-stone-300'"
                >Autor*in A-Z</button>
                <button @click="wechsleSortierung('bewertung')"
                    class="px-4 py-2 text-sm rounded-full transition-colors"
                    :class="sortierung === 'bewertung' ? 'bg-[#6E4CEB] text-white' : 'bg-stone-200 text-stone-700 hover:bg-stone-300'"
                >Bewertung</button>
                <button @click="wechsleSortierung('jahr')"
                    class="px-4 py-2 text-sm rounded-full transition-colors"
                    :class="sortierung === 'jahr' ? 'bg-[#6E4CEB] text-white' : 'bg-stone-200 text-stone-700 hover:bg-stone-300'"
                >Gelesen (Jahr)</button>
            </div>
            <div class="grid gap-8 md:grid-cols-3">
                <!-- x-for: Fuer jedes Buch eine Karte erstellen -->
                <template x-for="buch in buecher" :key="buch.titel">
                    <a :href="buch.url || '#'" :target="buch.url ? '_blank' : ''" class="block overflow-hidden transition-transform bg-white shadow-md rounded-xl hover:scale-105 cursor-pointer">
                        <!-- Bild mit Tags -->
                        <div class="relative">
                            <img :src="buch.bild" class="object-cover w-full h-64" />
                            <!-- Tags oben rechts -->
                            <div class="absolute top-2 right-2 flex flex-wrap gap-1 justify-end">
                                <template x-for="tag in buch.tags" :key="tag">
                                    <span class="px-2 py-1 text-xs font-medium text-white bg-[#6E4CEB]/80 rounded-full" x-text="tag"></span>
                                </template>
                            </div>
                        </div>
                        <div class="p-6">
                            <h3 class="text-xl font-bold" x-text="buch.titel"></h3>
                            <p class="mt-1 text-sm text-stone-500" x-text="buch.autor"></p>
                            <p class="mt-3 text-stone-600" x-text="buch.beschreibung"></p>
                        </div>
                    </a>
                </template>
            </div>

            <!-- Mehr laden Button -->
            <div class="mt-12 text-center" x-show="mehrVorhanden">
                <button
                    class="px-8 py-3 text-white bg-[#6E4CEB] rounded-lg hover:bg-[#5a3cc7] transition-colors"
                    :class="{ 'opacity-50': ladet }"
                    :disabled="ladet"
                    @click="seite++; ladeBuecher()"
                    x-text="ladet ? 'Lädt...' : 'Mehr Bücher laden'"
                ></button>
            </div>
        </section>

        <!-- Footer -->
        <footer class="py-8 text-center border-t text-stone-400 border-stone-200">
            <p>Made by Carlo with Bücherliebe</p>
        </footer>

    </div>

<!-- Parallax-Effekt: Wartet bis Lade-Animationen fertig sind, dann aktiviert Scroll-Verschiebung -->
<script>
    setTimeout(() => {
        document.querySelectorAll('.parallax-layer').forEach(layer => {
            layer.style.animation = 'none';
            layer.style.opacity = '1';
        });
        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            document.querySelectorAll('.parallax-layer').forEach(layer => {
                const speed = parseFloat(layer.dataset.speed);
                layer.style.transform = `translateY(${scrollY * speed}px)`;
            });
        });
    }, 2000);
</script>

<!-- Netlify Identity: Leitet nach Login automatisch zur Admin-Seite weiter -->
<script>
    if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
            if (!user) {
                window.netlifyIdentity.on("login", () => {
                    document.location.href = "/admin/";
                });
            }
        });
    }
</script>
</body>
</html>
